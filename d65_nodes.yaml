schema_version: 1

machine:
  family: "Epiroc FlexiROC D50/D55/D60/D65"
  model_under_test: "FlexiROC D65"
  catalog_status: "reverse_engineered"
  last_updated: "2026-07-14"

confidence_levels:
  confirmed: "Directly stated by the user, printed in a schematic, or observed as a CAN fact."
  high: "Supported by a repeatable log correlation, but not by an object dictionary."
  inferred: "Plausible interpretation that still needs an isolated physical test."
  unknown: "Observed object or wire whose function has not been identified."

