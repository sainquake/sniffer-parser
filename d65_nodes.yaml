schema_version: 1

machine:
  family: "Epiroc FlexiROC D50/D55/D60/D65"
  model_under_test: "FlexiROC D65"
  catalog_status: "reverse_engineered"
  last_updated: "2026-07-13"

confidence_levels:
  confirmed: "Directly stated by the user, printed in a schematic, or observed as a CAN fact."
  high: "Supported by a repeatable log correlation, but not by an object dictionary."
  inferred: "Plausible interpretation that still needs an isolated physical test."
  unknown: "Observed object or wire whose function has not been identified."

sources:
  - id: "user_node_table"
    kind: "field_information"
    description: "Node IDs and names supplied by the machine owner."
  - id: "schematic_io"
    kind: "electrical_schematic"
    file: "FlexiROC D65 -10LF (станки №204, 210, 211).pdf"
    description: "D550-D554 X3 channel assignments."
  - id: "schematic_power_engine"
    kind: "electrical_schematic"
    file: "FlexiROC D65 2.pdf"
    drawing: "9840042819"
    revision: "005"
    sheets: ["04(47)", "05(47)", "06(47)", "07(47)", "08(47)"]
    description: "Power, ignition, emergency stop, CPU supplies, and diesel engine interfaces."
  - id: "schematic_cpu_io"
    kind: "electrical_schematic"
    file: "FlexiROC D65 CPUs schematic.pdf"
    drawing: "9840042819"
    revision: "005"
    sheets: ["25(47)", "26(47)", "27(47)", "28(47)", "29(47)", "30(47)", "31(47)", "32(47)", "33(47)", "34(47)", "35(47)", "36(47)", "37(47)", "38(47)", "39(47)", "40(47)", "41(47)", "42(47)"]
    description: "CPU1/CPU2/CPU3 physical inputs, outputs, sensors, actuators, and relays."
  - id: "horn_log"
    kind: "can_log"
    file: "logs/2026-07-13_01-18-48_D65_can0_horn.jsonl"
    description: "Short CAN0 capture with an isolated cabin horn switch press."
  - id: "hmi_service_photos"
    kind: "field_diagnostic_display"
    captured_date: "2026-07-11"
    files:
      - "PXL_20260711_223705180.jpg"
      - "PXL_20260711_223712750.jpg"
      - "PXL_20260711_223731851.jpg"
      - "PXL_20260711_224039807.jpg"
      - "PXL_20260711_224055026.jpg"
      - "PXL_20260711_224109628.jpg"
      - "PXL_20260711_224121303.jpg"
    description: "On-machine HMI service pages showing signal names, engineering values, raw electrical values, controller/module locations, contacts, and PWM feedback."

buses:
  can0:
    physical_layer: "Classical CAN"
    identifier_format: "11-bit"
    bitrate: 500000
    protocol: "CANopen-compatible with Epiroc/Epec vendor extensions"
    confidence: "confirmed"
    observed_global_objects:
      - cob_id: "0x000"
        service: "CANopen NMT"
        observation: "81 20 (reset node 32), repeated approximately every 0.5 s"
        confidence: "confirmed"
      - cob_id: "0x080"
        service: "CANopen SYNC"
        mean_period_ms_in_horn_log: 87.4
        confidence: "confirmed"
      - cob_id: "0x07F"
        service: "vendor fast-cycle marker"
        dlc: 0
        mean_period_ms_in_horn_log: 5.34
        confidence: "high"
      - cob_id: "0x002"
        service: "vendor high-priority control"
        dlc: 8
        constant_payload_in_horn_log: "00 00 00 00 00 00 00 00"
        mean_period_ms_in_horn_log: 44.1
        confidence: "high"
    notes:
      - "Standard CANopen COB-ID arithmetic correctly identifies the confirmed nodes."
      - "No SDO or EMCY traffic was present in the short horn log."
      - "Heartbeat state 0x05 (Operational) was observed for nodes 1, 4, 5, 6, 7, 16, 17, and 19."
  can2:
    protocol: "unknown"
    presence: "reported by the HMI service page"
    observed_device: "D171"
    observed_functions: ["feed-beam rotation deviation", "feed-beam tilt deviation"]
    engineering_unit: "degree"
    confidence: "confirmed HMI attribution; no CAN2 log analyzed"

mapping_profiles:
  io_x3_digital_inputs:
    service: "TPDO1"
    payload: "uint16 little-endian"
    rule: "X3 input pin N is reported in absolute bit N-1; byte and bit fields below are zero-based."
    strongest_proof: "D552 X3 pin 10 changed absolute bit 9 during the isolated horn test."
    confidence: "high"
    limitations:
      - "The physical X3 channel assignments are schematic facts."
      - "The pin-to-bit rule is directly proven for D552 pin 10 and extrapolated to the other input pins."
      - "Output command bits are not identified; do not assume that an output uses the same TPDO1 bit."
  d553_tpdo2_tramming_joysticks:
    service: "TPDO2"
    cob_id: "0x285"
    payload: "four little-endian uint16 raw RM values"
    words:
      - {byte: 0, connector: "X1", contact: 11, signal: "S174A TRAMMING LEFT FORWARD"}
      - {byte: 2, connector: "X1", contact: 12, signal: "S174B TRAMMING LEFT BACKWARD"}
      - {byte: 4, connector: "X2", contact: 11, signal: "S175A TRAMMING RIGHT FORWARD"}
      - {byte: 6, connector: "X2", contact: 12, signal: "S175B TRAMMING RIGHT BACKWARD"}
    engineering_formula_candidate: "percent = (raw_RM - 2) / 1.2"
    evidence: "HMI raw values 62,62,64,60 correspond to 50.0%,50.0%,51.7%,48.3%; horn-log PDO values are 62-64,62-63,63-64,61 in the same order."
    confidence: "high"
  d552_tpdo2_watermist_flow:
    service: "TPDO2"
    cob_id: "0x286"
    payload: "four little-endian uint16 words"
    word: {byte: 6, connector: "X2", contact: 12, signal: "S272 WATER MIST FLOW", raw_unit: "RM"}
    evidence: "The HMI and every horn-log 0x286 payload both show raw value 9; the HMI engineering value is 0.0%."
    confidence: "high"
  cpu1_tpdo1_tramming_pwm_feedback:
    service: "TPDO1"
    cob_id: "0x190"
    payload: "four little-endian uint16 actual-current values in mA"
    words:
      - {byte: 0, signal: "Y206A TRAMMING LEFT FORWARD actual current"}
      - {byte: 2, signal: "Y206B TRAMMING LEFT BACKWARD actual current"}
      - {byte: 4, signal: "Y207A TRAMMING RIGHT FORWARD actual current"}
      - {byte: 6, signal: "Y207B TRAMMING RIGHT BACKWARD actual current"}
    evidence: "HMI actual-current vector 0,0,0,4 mA exactly equals all 53 observed 0x190 payloads: 0000 0000 0000 0400."
    confidence: "high"

scaling_profiles:
  temperature_4_20ma_minus50_150c:
    electrical_unit: "uA"
    electrical_range: [4000, 20000]
    engineering_unit: "degC"
    engineering_range: [-50, 150]
    formula: "temperature_degC = (current_uA - 8000) / 80"
    display_resolution_degC: 1
    evidence_samples:
      - {signal: "B147", current_uA: 8052, displayed_degC: 1}
      - {signal: "B362", current_uA: 8439, displayed_degC: 5}
      - {signal: "B366A", current_uA: 8381, displayed_degC: 5}
      - {signal: "B366B", current_uA: 8342, displayed_degC: 4}
    confidence: "confirmed within the HMI display resolution"
  d553_joystick_rm_to_percent:
    raw_unit: "RM"
    engineering_unit: "percent"
    formula: "percent = (raw_RM - 2) / 1.2"
    observed_points: [{raw_RM: 60, percent: 48.3}, {raw_RM: 62, percent: 50.0}, {raw_RM: 64, percent: 51.7}]
    confidence: "high"

